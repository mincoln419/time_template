# GitHub Pages 설정
title: 타임템플릿 - 하루를 디자인하다
description: 24시간 시계로 하루를 계획하고 회고하는 시간 관리 앱
author: mincoln419
url: https://mincoln419.github.io
baseurl: /time_template

# SEO 설정
lang: ko
timezone: Asia/Seoul

# 플러그인
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# SEO 태그 설정
seo:
  type: WebSite
  name: 타임템플릿
  description: 24시간 시계로 하루를 계획하고 회고하는 시간 관리 앱
  image: /assets/screens/09-home-radial.jpg
  twitter:
    card: summary_large_image

# 네비게이션
navigation:
  - title: 홈
    url: /
  - title: 개인정보처리방침
    url: /privacy.html
  - title: 이용약관
    url: /terms.html

# 빌드 설정
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# 포함할 파일
include:
  - _redirects
